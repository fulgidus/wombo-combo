  - id: agent-ready-cli
    title: Make wombo agent-ready
    description: >
      Retrofit the wombo CLI to be first-class usable by AI coding agents, following the principles in Justin Poehnelt's
      "You Need to Rewrite Your CLI for AI Agents". This means: machine-readable JSON output on every command, input
      validation/hardening against hallucinations, schema introspection (--describe/--help --json), dry-run support on
      all mutating commands, field masks or compact output modes to protect agent context windows, and shipping
      CONTEXT.md/AGENTS.md files that encode invariants agents cannot intuit from --help alone.
    status: done
    completion: 100
    difficulty: hard
    priority: critical
    depends_on: []
    effort: P2D
    started_at: 2026-03-11T11:16:05.906Z
    ended_at: 2026-03-11T11:37:34.110Z
    constraints:
      - Human-friendly output must remain the default on TTY; JSON is used when --output json is passed or stdout is not
        a TTY.
      - All existing commands must keep working — this is additive, not a rewrite.
      - Input validation must reject control characters, path traversals, embedded query params in IDs, and
        double-encoded strings.
    forbidden:
      - Do not remove or break any existing human-facing CLI flags or output.
      - Do not add a dependency on an external validation library — keep validation self-contained.
    references:
      - https://justin.poehnelt.com/posts/rewrite-your-cli-for-ai-agents/
      - https://modelcontextprotocol.io/
    notes:
      - "2026-03-11: Feature created from article reference. Prioritized as critical because dogfooding with wombo
        agents requires agent-friendly output."
    subtasks:
      - id: agent-json-output
        title: Add --output json to every command
        description: >
          Introduce a global --output flag (json | text, default text). When json is selected, every command must emit
          structured JSON to stdout instead of human-formatted text. Also auto-detect: if stdout is not a TTY, default
          to json.
        status: done
        completion: 100
        difficulty: medium
        priority: critical
        depends_on: []
        effort: PT4H
        started_at: 2026-03-11T11:20:57.464Z
        ended_at: 2026-03-11T11:21:01.752Z
        constraints:
          - JSON output must be valid, parseable JSON on a single line (or NDJSON for streaming).
          - 'Errors must also be JSON when --output json is active, e.g. {"error": "message"}.'
        forbidden: []
        references: []
        notes: []
        subtasks: []
      - id: agent-input-validation
        title: Input hardening against hallucinations
        description: >
          Add validation to all user/agent-supplied inputs: feature IDs, file paths, branch names, config values. Reject
          control characters (below ASCII 0x20), path traversals (../), embedded query params (?/#) in IDs, and
          percent-encoded strings that would be double-encoded.
        status: done
        completion: 100
        difficulty: medium
        priority: high
        depends_on: []
        effort: PT3H
        started_at: null
        ended_at: 2026-03-11T11:22:31.151Z
        constraints:
          - Validation must happen at the CLI boundary (parseArgs or command entry), not deep in library code.
          - Error messages must clearly state what was rejected and why.
        forbidden: []
        references: []
        notes: []
        subtasks: []
      - id: agent-schema-introspection
        title: Schema introspection (--describe / --help --json)
        description: >
          Add a --describe flag to each command (or a top-level `wombo describe <command>`) that emits a JSON schema of
          accepted arguments, flags, types, defaults, and descriptions. Agents can introspect what the CLI accepts at
          runtime without pre-stuffed docs.
