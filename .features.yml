features:
  - id: release-workflow
    title: GitHub Actions release workflow
    description: >
      Create a .github/workflows/release.yml that triggers when a new v* tag is pushed to the main branch. The workflow
      should install bun, run the build, create a GitHub Release with the tag name, and attach the dist bundle so users
      can install a specific version via `bun install -g github:fulgidus/wombo#vX.Y.Z`. The release body should be
      auto-generated from commits since the previous tag.
    status: done
    completion: 100
    difficulty: easy
    priority: high
    depends_on: []
    effort: PT2H
    started_at: 2026-03-11T11:13:33.636Z
    ended_at: 2026-03-11T11:13:58.737Z
    constraints:
      - Must trigger only on tags matching v* pushed to main.
      - Must use bun (not npm/yarn) for install and build steps.
      - Release body must include auto-generated changelog from git log between previous tag and current tag.
      - The workflow must verify the build succeeds before creating the release.
    forbidden:
      - Do not use npm publish or any npm registry — distribution is GitHub-only.
      - Do not use third-party release action if a simple gh CLI call suffices.
    references:
      - https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push
      - https://docs.github.com/en/rest/releases/releases#create-a-release
    notes:
      - "2026-03-11: Feature created. Package is already installable from GitHub; this adds proper release artifacts and
        changelogs."
    subtasks:
      - id: release-workflow-yaml
        title: Create release.yml workflow file
        description: |
          Write .github/workflows/release.yml with the trigger, build steps, and gh release create call.
