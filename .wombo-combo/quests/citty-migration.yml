id: citty-migration
title: Migrate CLI to Citty
goal: Replace hand-rolled arg parsing in index.ts with citty framework. Citty provides declarative command/subcommand
  definitions, typed args, auto-generated usage, and built-in completion support. The migration should preserve all
  existing commands, aliases, flags, output formats, and the schema introspection layer (describe/TOON). Must not break
  any existing CLI behavior.
