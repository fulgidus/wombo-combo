id: background-engine
title: Background DAG Execution Engine
goal: Decouple the execution engine from the CLI/TUI lifecycle so agents run independently in the background. Evolve the
  linear wave scheduler into a full DAG-aware engine that launches agents as their upstream dependencies complete. The
  TUI and CLI become observer/management clients that can attach and detach without affecting running agents. This
  enables doing wishlist-to-quest conversions, task management, and quest planning while agents are actively working.
