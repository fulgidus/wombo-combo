id: features-file-backup
title: Auto-backup .features.yml before writes
description: >
  Before every saveFeatures() call, create a backup copy of the current .features.yml as .features.yml.bak (or
  timestamped .features.yml.YYYY-MM-DDTHH-MM-SS.bak). A single YAML serialization bug could destroy the entire feature
  backlog. Also make saveFeatures atomic (write-to-tmp-then-rename) like saveState already does.
