id: bug-status-marks-dead-completed
title: Fix status command marking dead agents as completed without checking changes
description: >
  src/commands/status.ts:28-34 marks any agent whose process is no longer running as "completed" without checking
  branchHasChanges. Unlike the monitor in launch.ts which distinguishes between agents that made commits and those that
  crashed, status unconditionally marks dead=completed. This leads to empty merges of agents that crashed without
  writing code.
status: done
completion: 100
difficulty: easy
priority: high
