id: wombo-abort-command
title: wombo abort <feature-id> — kill single agent
description: >
  Add a `wombo abort <feature-id>` command that kills a single running agent without nuking the entire wave. Should kill
  the tmux session, mark the agent as failed (or optionally return it to queued for retry), and update wave state.
  Currently the only options are `cleanup` (kills everything) or manual `kill` of the PID.
