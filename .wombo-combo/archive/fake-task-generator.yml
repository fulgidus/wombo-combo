id: fake-task-generator
title: Create fake task tree generator script
description: |
  Create a standalone test utility at `tests/fixtures/generate-fake-tasks.ts` that
  programmatically generates complex task trees as YAML files for testing the
  orchestration engine.

  The generator should support multiple topology presets:
  - **linear-chain**: A→B→C→D (sequential dependency chain)
  - **fan-out**: A→{B,C,D,E} (one task fans out to many independent tasks)
  - **fan-in**: {A,B,C,D}→E (many independent tasks converge to one)
  - **diamond**: A→{B,C}→D (classic diamond dependency)
  - **deep-tree**: Multi-level tree with branching and convergence (3-4 levels)
  - **stress**: Generates N tasks with randomized dependencies (configurable N, default 20)
  - **mixed**: Combines all of the above into one complex graph (~15-25 tasks)

  Each generated task should have:
  - Valid kebab-case IDs (e.g. `fake-001`, `fake-chain-a`, `fake-diamond-top`)
  - A `description` field containing a `sleep_ms` value (e.g. `FAKE_SLEEP_MS=2000`)
    that the fake agent can parse to know how long to sleep
  - Correct `depends_on` arrays reflecting the topology
  - Varied `priority` and `difficulty` values for realistic sorting
  - Realistic `effort` durations (PT1M to PT30M)
  - `status: planned` so they're ready for launch

  The script should be runnable standalone:
