id: portless-integration
title: Use portless for localhost server testing
description: >
  When agents start localhost servers for testing, they must always use "portless" to avoid localhost:PORT collisions
  between concurrent agents in different worktrees. Integrate portless as a required tool for any build/test step that
  starts a server, and configure it automatically in agent worktrees.
