id: bug-trailing-flag-crash
title: Fix args[++i] crash when flag is last argument
description: >
  Flags like --priority, --model, --only that use `args[++i]` at src/index.ts:167-251 return undefined when no value
  follows. Flags that call .split(",") on the result (e.g. --only) throw "Cannot read properties of undefined". Must
  validate that args[i+1] exists before consuming it.
