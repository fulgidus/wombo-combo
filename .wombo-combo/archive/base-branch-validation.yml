id: base-branch-validation
title: Validate base branch exists before launch
description: >
  At the start of `wombo launch`, verify that the configured baseBranch exists as a local branch before creating wave
  state and worktrees. Currently if baseBranch doesn't exist, `git branch "feature/xxx" "nonexistent-branch"` fails only
  after the wave state is already created, leaving a broken state file.
