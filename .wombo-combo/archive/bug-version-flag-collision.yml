id: bug-version-flag-collision
title: Replace --version flag with dedicated `woco version` / `woco -v` command
description: >
  --version is documented as "print version and exit" but the arg parser at src/index.ts:219 consumes the next arg as a
  version string (for the upgrade command). Running `wombo launch --version` silently eats the next argument. Fix:
  remove --version as a flag entirely, add a `version` subcommand and `-v` shorthand that prints the version and exits.
  The upgrade command should use `--tag` or `--release` for version pinning instead.
