id: agent-browser-integration
title: Agent Browser for real browser testing
description: >
  Integrate "Agent Browser" to give agents real browser capabilities for testing web applications. When a feature
  involves UI/frontend work, the agent should be able to interact with a real browser instance for verification, visual
  regression testing, and end-to-end testing. This goes beyond headless testing — agents should have actual browser
  behavior available.
