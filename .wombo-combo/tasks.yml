  - id: dynamic-agent-types
    title: Dynamic agent-worker types from agency-agents registry
    description: >
      Support different agent-worker types when launching features. Available agents are dynamically pulled from
      https://github.com/msitarzewski/agency-agents and converted to woco-compatible agent definitions. Users can
      specify which agent type to use per feature (e.g. a frontend specialist, a test writer, a refactoring agent).
      Agents can be pulled on-demand at launch time, or woco can suggest alternatives from the registry based on feature
      description/tags.
    status: backlog
    completion: 0
    difficulty: hard
    priority: high
    depends_on: []
