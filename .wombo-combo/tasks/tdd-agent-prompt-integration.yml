id: tdd-agent-prompt-integration
title: Integrate TDD instructions into agent prompts
description: >
  Update the generalist-agent.md template (src/templates/generalist-agent.md) to include TDD red-green instructions.
  Agents should: (1) write failing tests first (red), (2) verify tests fail via `bun test`, (3) implement code to pass
  (green), (4) verify tests pass, (5) refactor. The template is installed into .opencode/agents/ during init. Also
  update renderAgentTemplate() in src/lib/templates.ts if the TDD section needs to be conditionally included based on
  project config (e.g. config.tdd.enabled). Use bun's built-in test runner (`bun test`) as the test command.
