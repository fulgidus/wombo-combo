id: bug-yaml-parse-error
title: Wrap YAML parse errors with user-friendly message
description: >
  When a task YAML file in .wombo-combo/tasks/ is corrupted, the raw yaml library error is shown. Wrap it with "Failed
  to parse .wombo-combo/tasks/<filename>.yml: <reason>" for better UX. The YAML parsing happens in loadTasksFromStore()
  in src/lib/task-store.ts. Add a try/catch around YAML.parse() calls and emit a user-friendly message that includes the
  filename and the original parse error reason.
