id: tui-wishlist
title: Wishlist/idea jotter in TUI
description: "Add a scratchpad/wishlist feature to the TUI where users can jot down ideas at any time. Ideas are stored
  persistently and can later be promoted into quests (via genesis/planning) or errands. Needs: 1) A storage file
  (.wombo-combo/wishlist.yml) with simple id/text/created_at entries. 2) A TUI overlay or view accessible via a keybind
  (e.g. W) from both Quest Picker and Task Browser. 3) Ability to add, delete, and promote wishlist items. Promotion to
  errand should pre-fill the errand description prompt."
