id: bg-tui-observer
quest: background-engine
title: TUI as pure attach/detach observer client
description: TUI connects to daemon via client protocol to display wave progress. Can attach mid-wave and detach without
  killing agents. Multiple TUI instances can observe the same wave. TUI sends commands (abort, retry) through the client
  protocol. Handles daemon-not-running gracefully. Works with both neo-blessed and future Ink TUI.
