id: dynamic-agent-types
title: Dynamic agent-worker types from agency-agents registry
description: >
  Support different agent types when launching tasks. Available agents are dynamically pulled from
  https://github.com/msitarzewski/agency-agents and converted to woco-compatible agent definitions (markdown files in
  .opencode/agents/). Users can specify which agent type to use per task via the `agent` YAML field or --agent flag on
  launch. Agents can be pulled on-demand at launch time, or woco can suggest alternatives from the registry based on
  task description/tags.

  Fallback behavior: If the specified agent is not found in the local cache or registry, emit a warning and fall back to
  generalist-agent.md. If the registry is unreachable (offline mode), use only locally cached agents. The cache location
  should be .wombo-combo/agents-cache/ (separate from .opencode/agents/ which is the active install dir).
