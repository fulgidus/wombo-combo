id: citty-subcommands
title: Migrate nested subcommand groups to Citty
description: "Convert the three subcommand groups (tasks/9 subs, quest/8 subs, wishlist/3 subs) to citty nested command
  definitions. Each subcommand gets its own defineCommand() with typed args. Dissolve the 4 alias maps (COMMAND_ALIASES,
  SUBCOMMAND_ALIASES, QUEST_SUBCOMMAND_ALIASES, WISHLIST_SUBCOMMAND_ALIASES) into citty meta.aliases. Preserve: default
  subcommand behavior (bare 'woco tasks' -> 'tasks list'), backward-compat aliases (features -> tasks, validate ->
  check). Remove handleTasksSubcommand() and handleWishlistSubcommand() routing functions. Tests: all 38 routable
  endpoints work, all aliases resolve correctly."
