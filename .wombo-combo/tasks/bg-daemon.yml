title: Background daemon process with Unix socket server and PID lifecycle
description: Create a long-running daemon process that manages agent execution independently of CLI/TUI. Includes Unix
  domain socket server for IPC, PID file management, graceful shutdown, and auto-cleanup. The daemon is the single owner
  of agent processes — CLI and TUI become clients.
