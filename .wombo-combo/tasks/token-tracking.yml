id: token-tracking
title: Token consumption tracking and reporting
description: "Track LLM token usage across all agent runs. Requirements: 1) Parse token usage from agent output events
  (opencode emits usage data in step_finish events). 2) Storage schema in .wombo-combo/usage.yml or usage.json — record
  per-run entries with: task_id, quest_id (if any), model, provider, harness (opencode/claude/gemini/etc.),
  input_tokens, output_tokens, cache_read, cache_write, timestamp. 3) Aggregate reporting: total tokens, by task, by
  quest, by model, by provider, by harness, by time period. 4) CLI command: woco usage [--by
  task|quest|model|provider|harness] [--since <date>] [--format table|json]. 5) TUI integration: show token usage
  summary in task browser detail pane and/or a dedicated usage view. Start with opencode harness, design for
  extensibility to other harnesses."
