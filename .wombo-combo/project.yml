name: wombo-combo
type: brownfield
description: AI agent orchestration system for parallel feature development — spawns coding agents into isolated git
  worktrees, coordinates their work through quests and dependency-aware task graphs, and verifies results before merge.
vision: "A dual-interface orchestration layer — CLI for LLM agents, TUI for humans — that turns high-level project goals
  into dependency-aware task graphs executed in parallel by autonomous coding agents. The CLI surface must be compact,
  machine-parseable (--output json), and context-efficient so agents can invoke wombo without blowing their context
  window. The TUI surface must guide human operators through multi-layered planning: from a rough vision, through quest
  decomposition and genesis planning, down to atomic, constraint-scoped tasks that agents can execute independently in
  isolated worktrees. The long-term aim is a self-improving development loop where agents plan, implement, verify, and
  merge features with minimal human intervention, while the human retains full oversight through HITL modes, real-time
  dashboards, and structured review gates."
