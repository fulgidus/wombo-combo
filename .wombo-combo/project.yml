tech_stack:
  runtime: Bun (>=1.0.0)
  language: TypeScript (strict mode, ESM only, target ES2022, bundler module resolution)
  frameworks:
    - Citty (CLI arg parsing + subcommands — migration target)
    - Ink (React-based terminal UI — migration target)
    - neo-blessed (current TUI framework
    - being migrated away from)
  tools:
    - yaml v2 (YAML parse/stringify)
    - git worktrees (agent isolation)
    - mermaidtui (Mermaid diagram rendering in TUI)
    - tmux / dmux (terminal multiplexer for agent sessions)
    - tsc (typecheck --noEmit)
    - bun build (single-file bundle to dist/)
    - bun test (built-in test runner)
  notes: ""
conventions:
  commits: "Conventional commits (feat/fix/refactor/chore/docs), scope in parens when applicable, reference feature ID
    (e.g. feat(tui): fix input handling [tui-onboarding-fixes]). Never skip hooks (--no-verify). Never force push main.
    Always typecheck + build before committing."
  branches: feature/<task-id> for agent work, main is the trunk, develop is the default base branch for worktrees. Branch
    prefix configurable via config.git.branchPrefix (default "feature/").
  testing: bun test (built-in runner), tests/ directory at project root, no external test framework. Test files use
    *.test.ts naming. TDD pipeline available via config.tdd when enabled.
  coding_style: 'ESM only ("type": "module" in package.json). Use .js extensions in import paths (Bun resolves to .ts at
    runtime). Prefer Bun APIs (Bun.file(), Bun.spawn(), Bun.write()) over Node stdlib equivalents. Minimal dependencies
    — justify any new addition. Hand-rolled arg parsing is legacy; new commands go in separate files under
    src/commands/. Keep modules focused and under ~500 lines where practical.'
  naming: "kebab-case for files and task IDs (pattern: ^[a-z0-9]+(-[a-z0-9]+)*$). camelCase for functions and variables.
    PascalCase for types, classes, and interfaces. Prefix bug tasks with bug-. Prefix TUI modules with tui-. Template
    files use descriptive kebab-case."
rules:
  - id: rule-1
    text: Always use `bun dev` to test, never the global `woco` binary — it runs stale snapshot code from the last release,
      not the current working tree
    scope: runtime
    rigidity: hard
    consequences: Testing against old code; bugs appear fixed or broken when they aren't; wasted debugging time
    tags:
      - development
      - testing
      - dogfooding
  - id: rule-2
    text: Always publish to npm — suggest distribution via `bun add -g wombo-combo`
    scope: distribution
    rigidity: soft
    consequences: Users cannot install via npm; reduces discoverability
    tags:
      - distribution
      - npm
  - id: rule-3
    text: Keep bun.lock committed for reproducible installs
    scope: dependencies
    rigidity: hard
    consequences: Non-deterministic dependency resolution; different machines get different versions; CI breaks
    tags:
      - dependencies
      - reproducibility
      - ci
  - id: rule-4
    text: Always commit .wombo-combo/ contents — we need to keep track of the dogfooded development state
    scope: development
    rigidity: soft
    consequences: Loss of task history, project profile, and wave state used during dogfooded development
    tags:
      - dogfooding
      - state
      - tracking
  - id: rule-5
    text: Always typecheck (bun run typecheck) and build (bun run build) before committing
    scope: quality
    rigidity: hard
    consequences: Broken commits on main; agents pick up uncompilable code; cascading failures across worktrees
    tags:
      - ci
      - quality
      - pre-commit
    hooks:
      trigger: pre-commit
      pre:
        - bun run typecheck
        - bun run build
      post: []
  - id: rule-6
    text: Never force push to main
    scope: git
    rigidity: hard
    consequences: Rewritten history breaks all active worktrees and agent branches; potential data loss
    tags:
      - git
      - safety
      - main
  - id: rule-7
    text: Always bump package.json version before creating a git tag — they must stay in sync
    scope: release
    rigidity: hard
    consequences: Version mismatch between tag and runtime; users install wrong version; upgrade detection breaks
    tags:
      - release
      - versioning
  - id: rule-8
    text: screen.destroy() handles terminal cleanup — never manually call removeAllListeners or setRawMode(false) on stdin
    scope: tui
    rigidity: hard
    consequences: Terminal left in raw mode after exit; stdin listeners leak; subsequent CLI commands misbehave
    tags:
      - tui
      - blessed
      - cleanup
  - id: rule-9
    text: Use element-level key bindings (widget.key()) not screen-level (scr.key()) during blessed input mode — grabKeys
      blocks screen handlers
    scope: tui
    rigidity: hard
    consequences: Key bindings silently stop working when a textarea or textbox has focus; users cannot navigate or submit
    tags:
      - tui
      - blessed
      - input
      - keybindings
  - id: rule-10
    text: No new dependencies without justification — if you want to use an external framework or library, get user
      permission first by explaining how it helps achieve project goals faster or better
    scope: dependencies
    rigidity: soft
    consequences: Dependency bloat; supply chain risk; harder to audit; conflicts with minimal-dependency philosophy
    tags:
      - dependencies
      - architecture
      - approval
