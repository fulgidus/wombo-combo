  - id: features-graph-command
    title: features graph — dependency graph visualization
    description: >
      Add `wombo features graph` command that builds a Mermaid flowchart from the features dependency graph and renders
      it as a Unicode/ASCII box diagram in the terminal using mermaidtui. Shows dependency edges, status badges, orphan
      detection, dangling dependency warnings, and cycle detection. Supports --ascii, --mermaid (raw source), --subtasks
      (include subtask nodes), --status (filter), and --output json.
